<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
  <meta charset="UTF-8">
  <title>Folders</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.8.1/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('tsview.static', filename='style.css') }}"/>
  <link href="{{ url_for('tsview.static', filename='menu_no_bs.css')}}"  rel="stylesheet"/>
  <script src="{{ url_for('tsview.static', filename='menu_stand_alone_elm.js')}}"></script>
  <script src="{{ url_for('tsview.static', filename='folders_elm.js')}}"></script>
</head>
<body translate="no">
    <div class="grid-container">
        <div id="menu-elm"></div>
        <div class="main-content">
            <div id="app-folder"></div>
        </div>
    </div>
   <script>
         var app = Elm.Folders.init({
             node: document.getElementById('app-folder'),
             flags: {
                 baseurl : "{{ homeurl }}",
             }
         });
   </script>
  <script>
         var menuapp = Elm.StandAloneMenu.init({
             node: document.getElementById('menu-elm'),
             flags: {{flags_menu | safe}}
         });
  </script>
  <script>
      // listen the copy event
      document.addEventListener(
          "copy",(event) => {
              console.log('in copy');
              app.ports.cutSignal.send(true);
          }
      );
      // listen the cut event
      // send it to the copySignal (same efect)
      document.addEventListener(
          "cut",(event) => {
              app.ports.cutSignal.send(true);
          }
      );
      // listen the past event
      document.addEventListener(
          "paste",(event) => {
              console.log('in paste');
              app.ports.pasteSignal.send(true);
          }
      );

      // horizon
      app.ports.saveToLocalStorage.subscribe(function (dataInCache) {
           localStorage.setItem("horizon", JSON.stringify(dataInCache))
       });
       incache = localStorage.getItem("horizon")
       if (incache === null) {
           incache = '{"horizon": null, "inferredFreq": false, "timeZone": "UTC"}'
       }
       app.ports.loadFromLocalStorage.send(incache);
  </script>
       {% include "menu_stand_alone.html" %}
</body>
</html>
