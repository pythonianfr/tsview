<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Folders</title>
  <link href="{{ url_for('tsview.static', filename='bootstrap.min.css')}}" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('tsview.static', filename='style.css') }}"/>
  <script src="{{ url_for('tsview.static', filename='folders_elm.js')}}"></script>
</head>
<body translate="no">
  <div id="app"></div>
   <script>
         app = Elm.Folders.init({
             node: document.getElementById('app'),
             flags: {
                 baseurl : "{{ homeurl }}",
             }
         });
   </script>
  <script>
      // listen the copy event
      document.getElementsByClassName('main-content')[0].addEventListener(
          "copy",(event) => {
              app.ports.copySignal.send(true);
          }
      );
      // listen the cut event
      document.getElementsByClassName('main-content')[0].addEventListener(
          "cut",(event) => {
              app.ports.copySignal.send(true);
          }
      );
  </script>
</body>
</html>
