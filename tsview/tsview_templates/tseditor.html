<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <link href="{{ url_for('tsview.static', filename='bootstrap.min.css')}}" rel="stylesheet"/>
        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
        <script src="https://cdn.plot.ly/plotly-1.50.1.min.js"></script>
        <script src="https://unpkg.com/@webcomponents/custom-elements@1.2.1/custom-elements.min.js">
        </script>
        <link rel="stylesheet" href="{{url_for('tsview.static', filename='tseditor.css')}}">
        <link rel="stylesheet" href="{{ url_for('tsview.static', filename='pygmentize.css') }}"/>
        <link rel="stylesheet" href="{{ url_for('tsview.static', filename='style.css') }}"/>
        <script src="./tsview_static/tseditor_elm.js"></script>
        <link href="{{ url_for('tsview.static', filename='menu_stand_alone.css')}}" rel="stylesheet"/>
        <script src="{{ url_for('tsview.static', filename='menu_stand_alone_elm.js')}}"></script>
        <script src="{{ url_for('tsview.static', filename='plot_figure.js')}}"></script>
        <title>{{title}}</title>
    </head>
    <body>
        <div class="grid-container">
            <div id="menu-elm"></div>
            <div class="main-content">
                <div id="app"></div>
            </div>
        </div>
        {% include "unescape.html" %}
        <script>
         app = Elm.Tseditor.init({
             node: document.getElementById('app'),
             flags: {
                 baseurl : "{{ homeurl }}",
                 name : htmlDecode("{{ name }}"),
                 min: "{{ min }}",
                 max: "{{ max }}",
                 debug: "{{ debug }}",
             }
         });

         class BatchCopy extends HTMLElement {
              constructor() {
                super();
              }
              connectedCallback() {
                this.onpaste = e => {
                     e.preventDefault();
                     const clipboardData = e.clipboardData || window.clipboardData;
                     const text = clipboardData.getData('text') || "";
                     const index = this.getAttribute('index')
                     const newEvent = new CustomEvent("pastewithdata", {
                         detail: {
                             text: text.trim(),
                             index: index
                         }
                     });
                     this.dispatchEvent(newEvent);
                     return false;
                 };
              }
         }
         window.customElements.define('batch-copy', BatchCopy);


         // port to copy something to the clipboard
         var clipboard = function (value) {
             var el = document.createElement('textarea');
             el.value = value;
             document.body.appendChild(el);
             el.select();
             document.execCommand('copy');
             document.body.removeChild(el);
         };
         app.ports.copyToClipboard.subscribe(clipboard);

         // this should probably be shared as a separate jinja template
         app.ports.saveToLocalStorage.subscribe(function (dataInCache) {
             localStorage.setItem("horizon", JSON.stringify(dataInCache))
         });
         incache = localStorage.getItem("horizon")
         if (incache === null) {
             incache = '{"horizon": null, "inferredFreq": false, "timeZone": "UTC"}'
         }
         app.ports.loadFromLocalStorage.send(incache);

         // round
         app.ports.saveLocal.subscribe(function (dataInCache) {
             localStorage.setItem("round", JSON.stringify(dataInCache))
         });
         incache = localStorage.getItem("round")
         if (incache === null) {
             incache = '{"round": null}'
         }
         app.ports.loadLocal.send(incache);

        </script>
        <script>
         var menuapp = Elm.StandAloneMenu.init({
             node: document.getElementById('menu-elm'),
             flags: {{flags_menu | safe}}
         });
        </script>
        <script>
            document.getElementsByClassName('main-content')[0].addEventListener(
                "copy",(event) => {
                    app.ports.copySignal.send(true);
                }
            );
        </script>
        {% include "menu_stand_alone.html" %}
    </body>
</html>
